<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for Analysis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 1.4em; margin-bottom: 16px; font-weight: 500; }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 20px;
            border: 4px solid #e0e0e0;
            border-top-color: #1976d2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            font-size: 0.95em;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .countdown {
            font-size: 0.85em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Waiting for Analysis</h1>
        <p class="message">
            Your analysis is being prepared. This page will automatically
            refresh until the analysis is ready to load.
        </p>
        <p class="countdown" id="countdown"></p>
    </div>

    <script>
    (function() {
        var interval = {{.RefreshSeconds}};
        var remaining = interval;
        var countdownEl = document.getElementById("countdown");

        function updateCountdown() {
            countdownEl.textContent = "Refreshing in " + remaining + "s\u2026";
        }

        function tick() {
            remaining--;
            if (remaining <= 0) {
                countdownEl.textContent = "Refreshing\u2026";
                window.location.reload();
                return;
            }
            updateCountdown();
            setTimeout(tick, 1000);
        }

        updateCountdown();
        setTimeout(tick, 1000);
    })();
    </script>
</body>
</html>
